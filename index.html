<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Oxanium:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading" id="loading">
        <div class="loader"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar glass" aria-label="Primary">
        <div class="logo neon-glow">MINI-GAMES</div>
        <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">☰</button>
        <ul class="nav-menu" id="navMenu">
            <li><a href="#hero">Home</a></li>
        </ul>
        <div class="nav-actions">
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
            <button class="btn btn-primary btn-sm">Play Now</button>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="hero" class="hero">
        <div class="hero-bg bg-gradient"></div>
        <div class="hero-blobs">
            <div class="blob-hero blob"></div>
            <div class="blob-hero blob"></div>
        </div>
        <img src="dark-crusader-lords-3840x2160-25958.jpg" alt="Epic Gaming Background" class="hero-image">
        <div class="hero-content">
            <h1>MINI-GAMES</h1>
            <p class="hero-subtitle">Enter the Future of Gaming</p>
            <div class="hero-buttons">
                <button class="btn btn-primary btn-lg">Start Playing</button>
                
            </div>
        </div>
    </section>


    <!-- Newsletter -->
    <section class="newsletter">
        <div class="newsletter-card glass">
            <h2>Join GameVerse</h2>
            <p>Get notified about new games and tournaments</p>
            <form class="newsletter-form">
                <input class="newsletter-input glass" type="email" placeholder="Enter your email" required>
                <button class="btn btn-ghost" type="submit">Subscribe</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="site-footer glass">
        <div class="footer-inner">
            <div class="footer-grid">
                <div>
                    <h4>GameVerse</h4>
                    <p>The future of competitive gaming platforms.</p>
                </div>
                <div>
                    <h4>Links</h4>
                    <ul>
                        <li><a href="#">About</a></li>
                        <li><a href="#">Tournaments</a></li>
                        <li><a href="#">Support</a></li>
                    </ul>
                </div>
                <div>
                    <h4>Follow</h4>
                    <div class="footer-social">
                        <a href="#" aria-label="Twitter">🐦</a>
                        <a href="#" aria-label="Twitch">📺</a>
                        <a href="#" aria-label="Discord">💬</a>
                    </div>
                </div>
            </div>
            <div class="footer-bottom">
                &copy; 2024 GameVerse. All rights reserved.
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
