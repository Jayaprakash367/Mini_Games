<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messenger 3D — City Delivery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loader-content">
      <div class="loader-title">MESSENGER 3D</div>
      <div class="loader-subtitle">City Delivery</div>
      <div class="loader-spinner"></div>
      <div class="loader-hint">Click anywhere to start</div>
    </div>
  </div>

  <!-- 3D Game Container -->
  <div id="game-container"></div>

  <!-- Interaction Prompt -->
  <div id="interaction-prompt" class="hidden"></div>

  <!-- HUD Overlay -->
  <div id="hud"></div>

  <!-- Dialogue Panel -->
  <div id="dialogue-panel" class="hidden"></div>

  <!-- Quest Notifications -->
  <div id="quest-notifications"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
