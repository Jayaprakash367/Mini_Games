<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Slice - MINI-GAMES</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Oxanium:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .game-container {
            max-width: 800px;
            margin: 8rem auto 2rem;
            padding: 2.5rem;
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            border-radius: 24px;
            backdrop-filter: blur(20px);
        }
        .game-title {
            font-family: var(--font-display);
            font-size: 2.8rem;
            background: linear-gradient(45deg, #ff6b6b, #ff1493);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .game-stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 1.5rem;
            gap: 1rem;
        }
        .stat {
            background: rgba(255, 107, 107, 0.1);
            border: 2px solid var(--glass-border);
            padding: 1.2rem;
            border-radius: 12px;
            text-align: center;
            flex: 1;
        }
        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #ff6b6b;
        }
        canvas#gameCanvas {
            width: 100%;
            height: 500px;
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.1) 0%, rgba(0, 245, 160, 0.05) 100%);
            border: 2px solid var(--glass-border);
            border-radius: 16px;
            display: block;
            margin-bottom: 1.5rem;
            cursor: crosshair;
        }
        .game-controls {
            text-align: center;
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        .btn {
            padding: 0.8rem 2rem;
            border: 2px solid #ff6b6b;
            background: transparent;
            color: #ff6b6b;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: #ff6b6b;
            color: black;
        }
        .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .game-over-card {
            background: var(--glass-bg);
            border: 2px solid #ff6b6b;
            padding: 3rem;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
        }
        .game-over-title {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        .game-over-score {
            font-size: 3rem;
            color: #ff6b6b;
            margin: 1.5rem 0;
        }
    </style>
</head>
<body>
    <nav class="navbar glass">
        <div class="logo neon-glow">MINI-GAMES</div>
        <a href="index.html" style="color: var(--text-primary); text-decoration: none; margin-left: auto;">← Back to Games</a>
    </nav>

    <div class="game-container">
        <h1 class="game-title">FRUIT SLICE</h1>
        
        <div class="game-stats">
            <div class="stat">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Combo</div>
                <div class="stat-value" id="combo">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Lives</div>
                <div class="stat-value" id="lives">3</div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div class="game-controls">
            <p>Press SPACE or Click to Start • Draw Lines to Slice Fruits • Avoid Bombs!</p>
        </div>

        <div class="btn-group">
            <button class="btn" id="startBtn">Start Game</button>
            <button class="btn" id="restartBtn">Restart</button>
        </div>
    </div>

    <div class="game-over-screen" id="gameOverScreen">
        <div class="game-over-card">
            <div class="game-over-title">GAME OVER</div>
            <div class="game-over-score" id="finalScore">0</div>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">Nice slicing!</p>
            <button class="btn" onclick="location.reload()" style="width: 100%; border-color: #ff6b6b;">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        let gameRunning = false;
        let gameOver = false;
        let score = 0;
        let combo = 0;
        let lives = 3;
        let fruits = [];
        let particles = [];
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;

        const fruitTypes = [
            { color: '#ff0000', name: 'apple' },
            { color: '#ffff00', name: 'banana' },
            { color: '#ff8c00', name: 'orange' },
            { color: '#ff69b4', name: 'watermelon' }
        ];

        function Fruit(x, y, type) {
            this.x = x;
            this.y = y;
            this.vx = (Math.random() - 0.5) * 6;
            this.vy = -8 - Math.random() * 3;
            this.radius = 20;
            this.type = type;
            this.sliced = false;
            this.gravity = 0.3;
        }

        Fruit.prototype.update = function() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += this.gravity;
        };

        Fruit.prototype.draw = function(ctx) {
            ctx.fillStyle = this.type.color;
            ctx.shadowColor = 'rgba(255, 107, 107, 0.8)';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowColor = 'transparent';
        };

        function spawnFruit() {
            const x = Math.random() * (canvas.width - 40) + 20;
            const y = canvas.height + 30;
            const type = fruitTypes[Math.floor(Math.random() * fruitTypes.length)];
            fruits.push(new Fruit(x, y, type));
        }

        canvas.addEventListener('mousedown', () => {
            if (gameRunning) isDrawing = true;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing || !gameRunning) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // Check fruit collision with line
            fruits.forEach(fruit => {
                if (!fruit.sliced && distance(lastX, lastY, x, y, fruit.x, fruit.y) < fruit.radius) {
                    fruit.sliced = true;
                    score += 10;
                    combo++;
                    
                    // Particles
                    for (let i = 0; i < 10; i++) {
                        particles.push({
                            x: fruit.x,
                            y: fruit.y,
                            vx: (Math.random() - 0.5) * 8,
                            vy: (Math.random() - 0.5) * 8,
                            life: 30,
                            color: fruit.type.color
                        });
                    }
                }
            });

            // Draw line
            ctx.strokeStyle = '#ff6b6b';
            ctx.lineWidth = 3;
            ctx.globalAlpha = 0.5;
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.globalAlpha = 1;

            lastX = x;
            lastY = y;
        });

        canvas.addEventListener('mouseup', () => {
            isDrawing = false;
        });

        canvas.addEventListener('click', () => {
            if (!gameRunning && !gameOver) startGame();
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === ' ' && !gameRunning && !gameOver) startGame();
        });

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', () => location.reload());

        function distance(x1, y1, x2, y2, px, py) {
            const dx = x2 - x1;
            const dy = y2 - y1;
            const len = Math.sqrt(dx * dx + dy * dy);
            if (len === 0) return Math.sqrt((px - x1) * (px - x1) + (py - y1) * (py - y1));
            
            const t = Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / (len * len)));
            const closestX = x1 + t * dx;
            const closestY = y1 + t * dy;
            return Math.sqrt((px - closestX) * (px - closestX) + (py - closestY) * (py - closestY));
        }

        function startGame() {
            gameRunning = true;
            gameOver = false;
            score = 0;
            combo = 0;
            lives = 3;
            fruits = [];
            particles = [];
            animate();
        }

        function updateGame() {
            fruits.forEach((f, i) => {
                f.update();
                if (f.y > canvas.height + 100) {
                    if (!f.sliced) {
                        lives--;
                        combo = 0;
                        if (lives <= 0) {
                            endGame();
                        }
                    }
                    fruits.splice(i, 1);
                }
            });

            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            });

            if (Math.random() < 0.02) spawnFruit();
        }

        function draw() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid
            ctx.strokeStyle = 'rgba(255, 107, 107, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 50) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }

            // Fruits
            fruits.forEach(f => f.draw(ctx));

            // Particles
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 30;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            });
        }

        function endGame() {
            gameRunning = false;
            gameOver = true;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo;
            document.getElementById('lives').textContent = lives;
        }

        function animate() {
            if (!gameRunning) return;

            draw();
            updateGame();
            updateUI();

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
